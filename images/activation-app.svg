<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- dark app background -->
  <rect width="600" height="400" fill="#0e1117"/>
  <!-- title bar -->
  <text x="30" y="42" fill="#fafafa" font-family="Poppins, sans-serif" font-size="22" font-weight="600">Activation Function Explorer</text>
  <line x1="30" y1="56" x2="570" y2="56" stroke="#262730" stroke-width="1"/>

  <!-- plot panel -->
  <rect x="60" y="80" width="500" height="270" rx="8" fill="#161a23" stroke="#262730" stroke-width="1"/>

  <!-- grid -->
  <g stroke="#232833" stroke-width="1">
    <line x1="60" y1="147" x2="560" y2="147"/>
    <line x1="60" y1="215" x2="560" y2="215"/>
    <line x1="60" y1="283" x2="560" y2="283"/>
    <line x1="185" y1="80" x2="185" y2="350"/>
    <line x1="310" y1="80" x2="310" y2="350"/>
    <line x1="435" y1="80" x2="435" y2="350"/>
  </g>
  <!-- axes -->
  <line x1="60" y1="215" x2="560" y2="215" stroke="#3a4152" stroke-width="1.5"/>
  <line x1="310" y1="80" x2="310" y2="350" stroke="#3a4152" stroke-width="1.5"/>

  <!-- tanh curve (purple) -->
  <path d="M60 340 C 200 335, 270 300, 310 215 C 350 130, 420 95, 560 90"
        fill="none" stroke="#6c63ff" stroke-width="3.5" stroke-linecap="round"/>
  <!-- sigmoid curve (pink) -->
  <path d="M60 300 C 220 298, 270 270, 310 215 C 350 160, 400 132, 560 130"
        fill="none" stroke="#f50057" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- ReLU curve (teal) -->
  <path d="M60 215 L 310 215 L 560 100"
        fill="none" stroke="#22d3aa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- legend -->
  <g font-family="Fira Code, monospace" font-size="13">
    <rect x="80" y="98" width="14" height="4" rx="2" fill="#6c63ff"/>
    <text x="100" y="103" fill="#c9cdd6">tanh</text>
    <rect x="160" y="98" width="14" height="4" rx="2" fill="#f50057"/>
    <text x="180" y="103" fill="#c9cdd6">sigmoid</text>
    <rect x="270" y="98" width="14" height="4" rx="2" fill="#22d3aa"/>
    <text x="290" y="103" fill="#c9cdd6">ReLU</text>
  </g>
</svg>
